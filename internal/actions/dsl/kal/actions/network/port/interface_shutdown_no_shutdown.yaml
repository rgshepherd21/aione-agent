# KAL action: interface_shutdown_no_shutdown
# Cycle (shutdown then no shutdown) a Cisco IOS-XE interface. Used by
# the autonomous remediation loop (Sprint E) to clear a stuck flapping
# interface or stuck protocol state.
#
# Tier 2 (approval-gated) because the toggle drops traffic on the
# interface for ~1 second during the down→up reconverge. Idempotent on
# a healthy interface — final state matches initial state.
#
# Demo target for Sprint E end-to-end (E7): correlation rule
# `link_flap` fires → proposer maps to this action → Claude reviews →
# autonomy policy auto-approves at tier=1+risk=low+confidence>=0.85
# (E4) → action dispatches via existing remediation_service chain →
# state_capture pre/post brackets → rollback if post-check fails.

id: interface_shutdown_no_shutdown
version: 1
tier: 2
category: network/port
description: "Cycle a Cisco IOS-XE switch interface (shutdown then no shutdown) to clear stuck protocol state. Tier 2 — approval-gated because the toggle disrupts traffic for ~1s. Idempotent: a healthy interface ends in the same state."
implementation: dsl
patent_claim_refs: ["4f", "4g"]

parameters:
  schema:
    type: object
    required: [interface_name]
    properties:
      interface_name:
        type: string
        description: "Interface to cycle (e.g. 'GigabitEthernet0/1')."
        minLength: 1
        maxLength: 64
        pattern: "^[A-Za-z][A-Za-z0-9/.\\-]*$"
    additionalProperties: false

idempotent: true

supported_platforms:
  - { os: linux,   archs: [amd64, arm64] }
  - { os: darwin,  archs: [amd64, arm64] }
  - { os: windows, archs: [amd64, arm64] }

transport: ssh
cred_type: ssh_key

device_executors:
  cisco_iosxe:
    pre_commands:
      # ``enable`` is required as the first step in the persistent-shell
      # transport (Sprint follow-up S1.b). Cisco IOS-XE and Arista EOS
      # both land the SSH user in user-EXEC ("ceos1>" / "Router>") mode
      # by default; ``configure terminal`` is invalid there. Pre-S1.b
      # the per-command-exec model occasionally landed privileged
      # depending on the device's vty config and silently masked this,
      # but the persistent shell preserves whatever mode the user lands
      # in. cEOS admin and Cisco DevNet sandbox both accept ``enable``
      # with no additional prompt; if a future device prompts for an
      # enable password we'll need an enable_secret entry on the
      # credential bundle.
      - "enable"
      - "terminal length 0"
      - "configure terminal"
    commands:
      - "interface {{interface_name}}"
      - "shutdown"
      - "no shutdown"
      # NOTE (Sprint follow-up S2.a): ``end`` intentionally omitted.
      # The post state_capture below uses ``do show interfaces ... |
      # json`` which only works from a config-flavor mode; ``end``
      # would pop us to privileged-EXEC where ``do`` is rejected as
      # ``% Invalid input``. The persistent shell's Close() sends a
      # graceful ``exit`` on session teardown so leaving the device
      # in (config-if)# is harmless from the next-action perspective
      # (the next action opens a fresh session anyway).
  # Arista EOS (Sprint F / F3). Identical CLI to IOS-XE — shutdown / no-shutdown toggle works the same.
  arista_eos:
    pre_commands:
      - "enable"
      - "terminal length 0"
      - "configure terminal"
    commands:
      - "interface {{interface_name}}"
      - "shutdown"
      - "no shutdown"
      # See cisco_iosxe note above — ``end`` omitted so post-capture's
      # ``do show interfaces`` runs from a valid config mode.

validators:
  post_execution:
    exit_code: 0
    timeout_seconds: 30

state_capture:
  # Sprint follow-up S2.a: structured state-capture targeting Arista
  # EOS. Both phases run ``do show interface <name> | json`` in
  # config mode (we're in config mode after ``configure terminal``
  # from pre_commands; the ``do`` prefix runs an exec command from
  # config). The parser ``vendor_eos_interface_status`` flattens
  # EOS's nested ``interfaces.<name>`` block into the canonical
  # state_payload shape used by the validator.
  #
  # KNOWN LIMITATION: state_capture is action-level in the current
  # schema, not per-vendor. When this action dispatches to
  # cisco_iosxe (a device class we don't soak today), IOS-XE will
  # reject ``| json`` and the parser will emit a capture row with
  # capture_succeeded=false. The action body still runs to
  # completion. A schema change to allow
  # ``device_executors.<vendor>.state_capture`` is queued for the
  # follow-up after S2.b lands; until then IOS-XE dispatches of
  # this action are best-effort on the capture side.
  pre:
    commands:
      # Plural ``show interfaces`` form — singular ``show interface``
      # is rejected as ``% Invalid input`` on cEOS-lab 4.35.4M for at
      # least some platforms. Confirmed manually on f7-ceos-2:
      # ``show interfaces ethernet1 | json`` returns the expected
      # ``{"interfaces": {"Ethernet1": {...}}}`` shape; the parser
      # ignores command form and only inspects the JSON object.
      - "do show interfaces {{interface_name}} | json"
    parser: vendor_eos_interface_status
  post:
    commands:
      - "do show interfaces {{interface_name}} | json"
    parser: vendor_eos_interface_status
  invariants:
    # Free-form for MVP; backend validator (S2.b) interprets.
    # This says: after the action, the interface's L2 must be up.
    - "post.line_protocol == 'up' (interface must come back up after toggle)"

rollback:
  possible: false
  rationale: "Idempotent toggle — final state matches initial state on a healthy interface. If the post-check sees the interface still down, that's a hardware/cable problem the toggle can't fix; operator escalation is the right path, not a rollback."
